  // ════════════════════════════
  //  HELPER DRAW FUNCTIONS
  // ════════════════════════════

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function fillRoundRect(ctx, x, y, w, h, r, color) {
    roundRect(ctx, x, y, w, h, r); ctx.fillStyle = color; ctx.fill();
  }

  function strokeRoundRect(ctx, x, y, w, h, r, color, lw) {
    roundRect(ctx, x, y, w, h, r); ctx.strokeStyle = color; ctx.lineWidth = lw || 1; ctx.stroke();
  }

  function drawBackground(ctx) {
    ctx.fillStyle = BG; ctx.fillRect(0, 0, S, S);
    const g1 = ctx.createRadialGradient(S*0.8, S*0.1, 0, S*0.8, S*0.1, S*0.7);
    g1.addColorStop(0, 'rgba(0,229,200,0.06)'); g1.addColorStop(1, 'transparent');
    ctx.fillStyle = g1; ctx.fillRect(0, 0, S, S);
    const g2 = ctx.createRadialGradient(S*0.1, S*0.9, 0, S*0.1, S*0.9, S*0.5);
    g2.addColorStop(0, 'rgba(99,102,241,0.04)'); g2.addColorStop(1, 'transparent');
    ctx.fillStyle = g2; ctx.fillRect(0, 0, S, S);
  }

  function drawGlassCard(ctx, x, y, w, h, r) {
    fillRoundRect(ctx, x, y, w, h, r||20, 'rgba(14,18,27,0.85)');
    strokeRoundRect(ctx, x, y, w, h, r||20, 'rgba(255,255,255,0.06)', 1.5);
  }

  function drawLogo(ctx, x, y, size) {
    const half = size/2, cx = x+half, cy = y+half;
    const bg = ctx.createLinearGradient(x,y,x+size,y+size);
    bg.addColorStop(0,'#0c1017'); bg.addColorStop(1,BG);
    ctx.beginPath(); ctx.arc(cx,cy,half,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill();
    ctx.beginPath(); ctx.arc(cx,cy,half-size*0.012,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,229,200,0.2)'; ctx.lineWidth=size*0.005; ctx.stroke();
    const fs=size*0.39;
    ctx.font=`800 ${fs}px 'Outfit',sans-serif`; ctx.textBaseline='middle';
    const fW=ctx.measureText('F').width, cW=ctx.measureText('C').width;
    const sx=cx-(fW+cW)/2, ty=cy+fs*0.04;
    ctx.textAlign='left';
    ctx.fillStyle='#FFFFFF'; ctx.fillText('F',sx,ty);
    const tg=ctx.createLinearGradient(cx-size*0.2,0,cx+size*0.2,y+size);
    tg.addColorStop(0,'#00e5c8'); tg.addColorStop(1,'#00c4aa');
    ctx.fillStyle=tg; ctx.fillText('C',sx+fW,ty);
  }

  function drawBrandName(ctx, x, y, fs) {
    ctx.font=`700 ${fs}px 'Outfit',sans-serif`; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle=TEXT;
    const w=ctx.measureText('Fit').width;
    ctx.fillText('Fit',x,y);
    ctx.fillStyle=ACCENT; ctx.fillText('Core',x+w,y);
  }

  function drawHeader(ctx) {
    drawLogo(ctx,60,50,48);
    drawBrandName(ctx,120,74,22);
  }

  function drawAccentLine(ctx, y) {
    const g=ctx.createLinearGradient(S/2-120,0,S/2+120,0);
    g.addColorStop(0,'transparent'); g.addColorStop(0.5,ACCENT); g.addColorStop(1,'transparent');
    ctx.strokeStyle=g; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(S/2-120,y); ctx.lineTo(S/2+120,y); ctx.stroke();
  }

  function wrapText(ctx, text, x, y, maxW, lh) {
    const words=text.split(' '); let line='', ty=y;
    for(let i=0;i<words.length;i++){
      const test=line+words[i]+' ';
      if(ctx.measureText(test).width>maxW&&i>0){
        ctx.fillText(line.trim(),x,ty); line=words[i]+' '; ty+=lh;
      } else { line=test; }
    }
    ctx.fillText(line.trim(),x,ty);
    return ty;
  }

  function drawFooter(ctx, text) {
    ctx.fillStyle=TEXT3; ctx.font='500 16px "Outfit",sans-serif'; ctx.textAlign='center';
    ctx.fillText(text||'fitcore.tech',S/2,S-50);
  }

  function drawPillarTag(ctx, x, y, text, bgColor, textColor) {
    ctx.font='600 14px "Outfit",sans-serif';
    const w = ctx.measureText(text).width + 24;
    fillRoundRect(ctx, x, y-12, w, 26, 6, bgColor);
    ctx.fillStyle = textColor;
    ctx.textAlign = 'left';
    ctx.fillText(text, x+12, y+3);
  }

  // ════════════════════════════

      {time:'16-20', task:'Kolejne 4 treningi', bad:false},
      {time:'21:00', task:'Wciąż odpisujesz na wiadomości...', bad:true},
    ];

    schedule.forEach((s,i)=>{
      const y=310+i*72;
      if(s.bad){

      } else {

      ctx.fillStyle=s.bad?AMBER:TEXT3;
      ctx.font='700 16px "JetBrains Mono",monospace'; ctx.textAlign='left';
      ctx.fillText(s.time,90,y+34);
      ctx.fillStyle=s.bad?RED:TEXT2;
      ctx.font='500 17px "Outfit",sans-serif';
      ctx.fillText(s.task,220,y+34);
    });

    // Bottom CTA
    fillRoundRect(ctx,60,S-110,S-120,56,14,'rgba(0,229,200,0.12)');
    strokeRoundRect(ctx,60,S-110,S-120,56,14,'rgba(0,229,200,0.25)',1.5);
    ctx.fillStyle=ACCENT; ctx.font='700 19px "Outfit",sans-serif'; ctx.textAlign='center';
    ctx.fillText('A gdyby czerwone wiersze zajęły 15 minut?',S/2,S-78);

  // ════════════════════════════

    drawAccentLine(ctx,320);

      {icon:'📈', title:'Postępy klientów', sub:'Wykresy, pomiary, zdjęcia — wszystko tu'},

    // Bottom
    fillRoundRect(ctx,60,S-110,S-120,56,14,'rgba(0,229,200,0.12)');

    // Bottom

    ctx.fillText('Max 60 sekund · Napisy PL · FitCore logo na końcu',S/2,S-50);
  }

  // ════════════════════════════
  //  POST 4: WARTOŚĆ — 3 sygnały
  // ════════════════════════════

  function drawPost4(ctx) {
    drawBackground(ctx);
    drawHeader(ctx);

    ctx.fillStyle=TEXT; ctx.font='800 40px "Outfit",sans-serif'; ctx.textAlign='left';
    wrapText(ctx,'3 sygnały że klient zaraz odejdzie',60,200,S-120,50);

    ctx.fillStyle=TEXT2; ctx.font='400 20px "Outfit",sans-serif';
    ctx.fillText('(zanim sam Ci powie)',60,270);

    drawAccentLine(ctx,310);

    const signs = [
      {
        num:'01', title:'Przestaje odpisywać',
        sub:'Nie jest zajęty. Stracił motywację.',
        tip:'Reaguj — napisz pierwszy, zapytaj jak się czuje.',
        color: RED
      },
      {
        num:'02', title:'Nie loguje wyników',
        sub:'Trenuje sam, bez Twojego planu.',
        tip:'Czas na szczerą rozmowę o celach.',
        color: AMBER
      },
      {
        num:'03', title:'"Ile zostało w pakiecie?"',
        sub:'Liczy dni do końca. Nie przedłuży.',
        tip:'Pokaż mu wartość TERAZ, nie przy odnowieniu.',
        color: RED
      },
    ];

    signs.forEach((s,i)=>{
      const y=340+i*185;
      drawGlassCard(ctx,60,y,S-120,165,16);

      // Number circle
      ctx.beginPath(); ctx.arc(120,y+55,32,0,Math.PI*2);
      ctx.fillStyle=`${s.color}25`; ctx.fill();
      ctx.fillStyle=s.color;
      ctx.font='800 24px "Outfit",sans-serif'; ctx.textAlign='center';
      ctx.fillText(s.num,120,y+58);

      ctx.fillStyle=TEXT; ctx.font='700 22px "Outfit",sans-serif'; ctx.textAlign='left';
      ctx.fillText(s.title,175,y+45);

      ctx.fillStyle=TEXT2; ctx.font='400 16px "Outfit",sans-serif';
      ctx.fillText(s.sub,175,y+75);

      ctx.fillStyle=GREEN; ctx.font='500 15px "Outfit",sans-serif';
      ctx.fillText('→ '+s.tip,175,y+105);
    });

    // Bottom
    ctx.fillStyle=BLUE; ctx.font='600 17px "Outfit",sans-serif'; ctx.textAlign='center';
    ctx.fillText('💾 Zapisz na później · Potrzebujesz danych, nie intuicji.',S/2,S-55);
    drawFooter(ctx);
  }

  // ════════════════════════════
  //  RENDER ALL POSTS
  // ════════════════════════════

  const grid = document.getElementById('grid');

  function renderPosts() {
    posts.forEach(post => {
      const wrap = document.createElement('div');
      wrap.className = 'post-wrap';

      // Header row
      const header = document.createElement('div');
      header.className = 'post-header';
      header.innerHTML = `
        <span class="post-day ${post.dayClass}">${post.pillar.split(' ')[0]} ${post.pillar.split(' ')[1]}</span>
        <span class="post-pillar">${post.pillar}</span>
        <span class="post-date">${post.day}</span>
      `;
      wrap.appendChild(header);

      // Canvas (not for reel-only if desired, but we still show visual)
      const frame = document.createElement('div');
      frame.className = 'post-frame';
      const canvas = document.createElement('canvas');
      canvas.width = S; canvas.height = S;
      canvas.id = post.id;
      frame.appendChild(canvas);
      wrap.appendChild(frame);

      // Download button
      const btnRow = document.createElement('div');
      btnRow.className = 'btn-row';
      const dlBtn = document.createElement('button');
      dlBtn.textContent = post.isReel ? 'Pobierz storyboard (PNG)' : 'Pobierz post (PNG)';
      dlBtn.onclick = () => downloadOne(post.id);
      btnRow.appendChild(dlBtn);
      wrap.appendChild(btnRow);

      // Reel tips
      if (post.isReel && post.reelTips) {
        const reelCard = document.createElement('div');
        reelCard.className = 'reel-card';
        reelCard.innerHTML = `<h4>📹 Wskazówki do nagrania rolki</h4><ul>${post.reelTips.map(t=>`<li>${t}</li>`).join('')}</ul>`;
        wrap.appendChild(reelCard);
      }

      // Caption
      const captionBox = document.createElement('div');
      captionBox.className = 'caption-box';
      captionBox.innerHTML = `<div class="label"><span>Opis do skopiowania</span><span class="copy-hint">Kliknij → kopiuj</span></div>${post.caption}`;
      captionBox.onclick = () => {
        navigator.clipboard.writeText(post.caption).then(()=>{
          captionBox.style.borderColor = 'rgba(0,229,200,0.4)';
          const fb = captionBox.querySelector('.copy-hint');
          if(fb) { fb.style.opacity='1'; fb.textContent='✓ Skopiowano!'; fb.style.color=ACCENT; }
          setTimeout(()=>{
            captionBox.style.borderColor = '';
            if(fb) { fb.style.opacity=''; fb.textContent='Kliknij → kopiuj'; fb.style.color=''; }
          },2000);
        });
      };
      wrap.appendChild(captionBox);

      grid.appendChild(wrap);
    });

    // Draw after fonts load
    document.fonts.ready.then(()=>{
      posts.forEach(post=>{
        const canvas = document.getElementById(post.id);
        const ctx = canvas.getContext('2d');
        post.draw(ctx);
      });
    });
  }

  function downloadOne(id) {
    const canvas = document.getElementById(id);
    const link = document.createElement('a');
    link.download = `fitcore-${id}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  function downloadAll() {
    posts.forEach(p => downloadOne(p.id));
  }

  renderPosts();
</script>

  // ════════════════════════════
  //  HELPER DRAW FUNCTIONS
  // ════════════════════════════

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }
  function fillRR(ctx,x,y,w,h,r,c){ roundRect(ctx,x,y,w,h,r); ctx.fillStyle=c; ctx.fill(); }
  function strokeRR(ctx,x,y,w,h,r,c,lw){ roundRect(ctx,x,y,w,h,r); ctx.strokeStyle=c; ctx.lineWidth=lw||1; ctx.stroke(); }
  function glass(ctx,x,y,w,h,r){ fillRR(ctx,x,y,w,h,r||20,'rgba(14,18,27,0.85)'); strokeRR(ctx,x,y,w,h,r||20,'rgba(255,255,255,0.06)',1.5); }

  function drawBG(ctx){
    ctx.fillStyle=BG; ctx.fillRect(0,0,S,S);
    let g=ctx.createRadialGradient(S*0.8,S*0.1,0,S*0.8,S*0.1,S*0.7);
    g.addColorStop(0,'rgba(0,229,200,0.06)'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
    g=ctx.createRadialGradient(S*0.1,S*0.9,0,S*0.1,S*0.9,S*0.5);
    g.addColorStop(0,'rgba(99,102,241,0.04)'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
  }

  function drawLogo(ctx,x,y,sz){
    const h=sz/2,cx=x+h,cy=y+h;
    const bg=ctx.createLinearGradient(x,y,x+sz,y+sz);
    bg.addColorStop(0,'#0c1017'); bg.addColorStop(1,BG);
    ctx.beginPath(); ctx.arc(cx,cy,h,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill();
    ctx.beginPath(); ctx.arc(cx,cy,h-sz*0.012,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,229,200,0.2)'; ctx.lineWidth=sz*0.005; ctx.stroke();
    const fs=sz*0.39;
    ctx.font=`800 ${fs}px 'Outfit',sans-serif`; ctx.textBaseline='middle';
    const fW=ctx.measureText('F').width;
    const sx=cx-(fW+ctx.measureText('C').width)/2;
    ctx.textAlign='left'; ctx.fillStyle='#FFF'; ctx.fillText('F',sx,cy+fs*0.04);
    const tg=ctx.createLinearGradient(cx-sz*0.2,0,cx+sz*0.2,y+sz);
    tg.addColorStop(0,'#00e5c8'); tg.addColorStop(1,'#00c4aa');
    ctx.fillStyle=tg; ctx.fillText('C',sx+fW,cy+fs*0.04);
  }

  function drawBrand(ctx,x,y,fs){
    ctx.font=`700 ${fs}px 'Outfit',sans-serif`; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle=TEXT; const w=ctx.measureText('Fit').width;
    ctx.fillText('Fit',x,y); ctx.fillStyle=ACCENT; ctx.fillText('Core',x+w,y);
  }

  function hdr(ctx){ drawLogo(ctx,60,50,48); drawBrand(ctx,120,74,22); }

  function accentLine(ctx,y){
    const g=ctx.createLinearGradient(S/2-120,0,S/2+120,0);
    g.addColorStop(0,'transparent'); g.addColorStop(0.5,ACCENT); g.addColorStop(1,'transparent');
    ctx.strokeStyle=g; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(S/2-120,y); ctx.lineTo(S/2+120,y); ctx.stroke();
  }

  function wrap(ctx,text,x,y,mw,lh){
    const words=text.split(' '); let line='',ty=y;
    for(let i=0;i<words.length;i++){
      const t=line+words[i]+' ';
      if(ctx.measureText(t).width>mw&&i>0){ ctx.fillText(line.trim(),x,ty); line=words[i]+' '; ty+=lh; }
      else { line=t; }
    } ctx.fillText(line.trim(),x,ty); return ty;
  }

  function pillarTag(ctx,x,y,text,bg,tc){
    ctx.font='600 14px "Outfit",sans-serif';
    const w=ctx.measureText(text).width+24;
    fillRR(ctx,x,y-12,w,26,6,bg); ctx.fillStyle=tc; ctx.textAlign='left'; ctx.fillText(text,x+12,y+3);
  }

  // ════════════════════════════
  //  POST 1: BÓL — PAIN→HOOK

  function drawPostV2_1(ctx) {
    drawBG(ctx); hdr(ctx);
    // Main hook — big, provocative
    ctx.fillStyle=TEXT; ctx.font='800 44px "Outfit",sans-serif'; ctx.textAlign='left';
    wrap(ctx,'Odpisujesz klientom o 23:00.',60,210,S-120,54);

    ctx.fillStyle=RED; ctx.font='700 30px "Outfit",sans-serif';
    ctx.fillText('I nazywasz to "biznes".',60,310);

    accentLine(ctx,360);

    // Timeline — compressed, punchy
    const times = [
      {label:'RANO', text:'Trenujesz ludzi', color:GREEN},
      {label:'POŁUDNIE', text:'Szukasz kto zapłacił w arkuszu', color:AMBER},
      {label:'WIECZÓR', text:'Wciąż odpisujesz na wiadomości', color:RED},
      {label:'NOC', text:'Planujesz treningi na jutro', color:RED},
    ];

    times.forEach((t,i)=>{
      const y=395+i*95;
      glass(ctx,60,y,S-120,78,14);

      // Time label
      fillRR(ctx,85,y+22,100,34,8,t.color+'20');
      ctx.fillStyle=t.color; ctx.font='700 13px "JetBrains Mono",monospace'; ctx.textAlign='center';
      ctx.fillText(t.label,135,y+42);

      ctx.fillStyle=TEXT; ctx.font='500 20px "Outfit",sans-serif'; ctx.textAlign='left';
      ctx.fillText(t.text,205,y+44);
    });

    // Bottom punchline
    fillRR(ctx,60,S-130,S-120,72,14,'rgba(239,68,68,0.1)');
    strokeRR(ctx,60,S-130,S-120,72,14,'rgba(239,68,68,0.2)',1.5);
    ctx.fillStyle=TEXT; ctx.font='700 20px "Outfit",sans-serif'; ctx.textAlign='center';

    wrap(ctx,'Twój klient właśnie się zalogował. Oto co widzi.',60,200,S-120,48);

    accentLine(ctx,310);

    // Comparison: before vs after
    const colW = (S-140)/2;

    // LEFT — Before
    glass(ctx,50,340,colW,460,16);
    fillRR(ctx,50,340,colW,45,16,'rgba(239,68,68,0.08)');
    ctx.fillStyle=RED; ctx.font='700 16px "Outfit",sans-serif'; ctx.textAlign='center';
    ctx.fillText('❌  Bez systemu',50+colW/2,368);

    const before = ['PDF w chacie WhatsApp','Szuka między memami','Nie pamięta ćwiczeń','Pyta Cię co 2 dni','Czuje się jak "jeden z wielu"'];
    ctx.textAlign='left'; ctx.font='400 16px "Outfit",sans-serif';
    before.forEach((t,i)=>{
      ctx.fillStyle=TEXT2; ctx.fillText('→  '+t,75,420+i*52);

    // Divider
    ctx.fillStyle=TEXT3; ctx.font='700 20px "Outfit",sans-serif'; ctx.textAlign='center';
    ctx.fillText('VS',S/2,570);

    // RIGHT — After
    glass(ctx,S/2+20,340,colW,460,16);
    fillRR(ctx,S/2+20,340,colW,45,16,'rgba(0,229,200,0.08)');
    ctx.fillStyle=ACCENT; ctx.font='700 16px "Outfit",sans-serif'; ctx.textAlign='center';
    ctx.fillText('✅  Portal FitCore',S/2+20+colW/2,368);

    const after = ['Plan treningowy na dziś','Historia + wykresy postępów','Czat z trenerem w apce','Twoje logo, Twoje kolory','Czuje się jak VIP'];
    ctx.textAlign='left'; ctx.font='400 16px "Outfit",sans-serif';
    after.forEach((t,i)=>{
      ctx.fillStyle=TEXT; ctx.fillText('→  '+t,S/2+45,420+i*52);
    });

    // Bottom
    fillRR(ctx,60,S-110,S-120,56,14,'rgba(0,229,200,0.12)');
    strokeRR(ctx,60,S-110,S-120,56,14,'rgba(0,229,200,0.25)',1.5);
    ctx.fillStyle=ACCENT; ctx.font='700 18px "Outfit",sans-serif'; ctx.textAlign='center';
    ctx.fillText('Premium doświadczenie. Darmowe demo → fitcore.tech',S/2,S-78);
  }

  // ════════════════════════════
  //  POST 3: TWARZ — REELS SCRIPT
  // ════════════════════════════

  function drawPostV2_3(ctx) {
    drawBG(ctx); hdr(ctx);
    ctx.fillStyle=TEXT; ctx.font='800 34px "Outfit",sans-serif'; ctx.textAlign='left';
    wrap(ctx,'"Zapytałem 20 trenerów ile czasu tracą na administrację."',60,200,S-120,44);

    ctx.fillStyle=AMBER; ctx.font='700 26px "Outfit",sans-serif';
    ctx.fillText('Odpowiedzi mnie zaskoczyły.',60,310);

    accentLine(ctx,350);

    // Script blocks
    const blocks = [
      {time:'0-3s',label:'HOOK',color:RED,text:'Patrz w kamerę, tekst na ekranie'},
      {time:'3-12s',label:'PROBLEM',color:AMBER,text:'8-12h tygodniowo na admin'},
      {time:'12-25s',label:'DEMO',color:GREEN,text:'Pokaż ekran FitCore'},
      {time:'25-35s',label:'CTA',color:ACCENT,text:'"Ile TY tracisz? Komentarz 👇"'},
    ];

    blocks.forEach((b,i)=>{
      const y=380+i*140;
      glass(ctx,60,y,S-120,120,16);

      // Time + label
      fillRR(ctx,85,y+15,75,28,8,'rgba(255,255,255,0.06)');
      ctx.fillStyle=TEXT3; ctx.font='600 12px "JetBrains Mono",monospace'; ctx.textAlign='center';
      ctx.fillText(b.time,122,y+33);

      ctx.fillStyle=b.color; ctx.font='800 20px "Outfit",sans-serif'; ctx.textAlign='left';
      ctx.fillText(b.label,180,y+35);

      // Progress bar
      const barW = S-200;
      fillRR(ctx,85,y+60,barW,6,3,'rgba(255,255,255,0.06)');
      const progress = [0.08, 0.35, 0.72, 1.0][i];
      fillRR(ctx,85,y+60,barW*progress,6,3,b.color);

      ctx.fillStyle=TEXT2; ctx.font='400 16px "Outfit",sans-serif';
      ctx.fillText(b.text,85,y+95);
    });

    ctx.fillStyle=TEXT3; ctx.font='500 14px "Outfit",sans-serif'; ctx.textAlign='center';
    ctx.fillText('Max 35s · Mikrofon bezprzewodowy · Napisy PL · FitCore logo',S/2,S-50);
  }

  // ════════════════════════════
  //  POST 4: WARTOŚĆ — TIPS THAT GET SAVED
  // ════════════════════════════

  function drawPostV2_4(ctx) {
    drawBG(ctx); hdr(ctx);
    ctx.fillStyle=TEXT; ctx.font='800 38px "Outfit",sans-serif'; ctx.textAlign='left';
    wrap(ctx,'5 rzeczy które robią trenerzy, którym klienci nie odchodzą',60,200,S-120,48);

    accentLine(ctx,310);

    const tips = [
      {num:'01', tip:'Piszą do klienta ZANIM on napisze', sub:'5 sekund, ogromny efekt', icon:'💬'},
      {num:'02', tip:'Reagują na ciszę w 48h', sub:'Cisza to sygnał, nie spokój', icon:'🔔'},
      {num:'03', tip:'Pokazują postęp, nie plan', sub:'Wykresy > słowa', icon:'📈'},
      {num:'04', tip:'Mają system, nie pamięć', sub:'Dashboard > notatnik', icon:'🖥️'},
      {num:'05', tip:'Budują relację, nie autopilota', sub:'Klient zostaje bo chce, nie bo zapomniał', icon:'🔄'},
    ];

    tips.forEach((t,i)=>{
      const y=340+i*118;
      glass(ctx,60,y,S-120,100,16);

      // Number
      ctx.beginPath(); ctx.arc(115,y+50,28,0,Math.PI*2);
      ctx.fillStyle='rgba(59,130,246,0.12)'; ctx.fill();
      ctx.fillStyle=BLUE; ctx.font='800 20px "Outfit",sans-serif'; ctx.textAlign='center';
      ctx.fillText(t.num,115,y+53);

      // Tip text
      ctx.fillStyle=TEXT; ctx.font='700 19px "Outfit",sans-serif'; ctx.textAlign='left';
      ctx.fillText(t.tip,160,y+40);

      ctx.fillStyle=TEXT2; ctx.font='400 15px "Outfit",sans-serif';
      ctx.fillText('→ '+t.sub,160,y+68);

      // Icon
      ctx.font='24px sans-serif'; ctx.textAlign='right';
      ctx.fillText(t.icon,S-85,y+53);
    });

    // Bottom save CTA
    fillRR(ctx,60,S-100,S-120,50,14,'rgba(59,130,246,0.12)');
    strokeRR(ctx,60,S-100,S-120,50,14,'rgba(59,130,246,0.2)',1.5);
    ctx.fillStyle=BLUE; ctx.font='700 17px "Outfit",sans-serif'; ctx.textAlign='center';
    ctx.fillText('💾 Zapisz ten post — wróć do niego za tydzień',S/2,S-70);
  }

  // ════════════════════════════
  //  RENDER
  // ════════════════════════════

  const grid = document.getElementById('grid');

  function renderPosts() {
    posts.forEach(post => {
      const wrap = document.createElement('div');
      wrap.className = 'post-wrap';

      // Header
      const header = document.createElement('div');
      header.className = 'post-header';
      let techBadge = '';
      if (post.technique) {
        techBadge = `<span class="technique-badge ${post.techniqueClass}">${post.technique}</span>`;
      }
      header.innerHTML = `
        <span class="post-day ${post.dayClass}">${post.pillar.split(' ')[0]} ${post.pillar.split(' ')[1]}</span>
        <span class="post-pillar">${post.pillar}</span>${techBadge}
        <span class="post-date">${post.day}</span>`;
      wrap.appendChild(header);

      // Canvas
      const frame = document.createElement('div');
      frame.className = 'post-frame';
      const canvas = document.createElement('canvas');
      canvas.width = S; canvas.height = S; canvas.id = post.id;
      frame.appendChild(canvas);
      wrap.appendChild(frame);

      // Download
      const btnRow = document.createElement('div');
      btnRow.className = 'btn-row';
      const dlBtn = document.createElement('button');
      dlBtn.textContent = post.isReel ? 'Pobierz storyboard (PNG)' : 'Pobierz post (PNG)';
      dlBtn.onclick = () => downloadOne(post.id);
      btnRow.appendChild(dlBtn);
      wrap.appendChild(btnRow);

      // Reel script (structured)
      if (post.isReel && post.reelScript) {
        const scriptCard = document.createElement('div');
        scriptCard.className = 'reel-script';
        let scriptHTML = '<h4>🎬 Scenariusz rolki (Reels Script)</h4>';
        post.reelScript.forEach(s => {
          scriptHTML += `<div class="script-block">
            <div class="script-time">${s.time}</div>
            <div class="script-label" style="color:${s.labelColor}">${s.label}</div>
            <div class="script-text">${s.text}</div>
            <div style="font-size:11px;color:#525a6e;margin-top:4px">📷 ${s.hint}</div>
          </div>`;
        });
        scriptCard.innerHTML = scriptHTML;
        wrap.appendChild(scriptCard);
      }

      // Reel tips
      if (post.isReel && post.reelTips) {
        const reelCard = document.createElement('div');
        reelCard.className = 'reel-card';
        reelCard.innerHTML = `<h4>📹 Wskazówki do nagrania</h4><ul>${post.reelTips.map(t=>`<li>${t}</li>`).join('')}</ul>`;
        wrap.appendChild(reelCard);
      }

      // Caption
      const captionBox = document.createElement('div');
      captionBox.className = 'caption-box';
      captionBox.innerHTML = `<div class="label"><span>Opis do skopiowania</span><span class="copy-hint">Kliknij → kopiuj</span></div>${post.caption}`;
      captionBox.onclick = () => {
        navigator.clipboard.writeText(post.caption).then(()=>{
          captionBox.style.borderColor = 'rgba(0,229,200,0.4)';
          const h = captionBox.querySelector('.copy-hint');
          if(h){h.style.opacity='1';h.textContent='✓ Skopiowano!';h.style.color=ACCENT;}
          setTimeout(()=>{
            captionBox.style.borderColor='';
            if(h){h.style.opacity='';h.textContent='Kliknij → kopiuj';h.style.color='';}
          },2000);
        });
      };
      wrap.appendChild(captionBox);

      grid.appendChild(wrap);
    });

    document.fonts.ready.then(()=>{
      posts.forEach(p=>{
        const c=document.getElementById(p.id);
        p.draw(c.getContext('2d'));
      });
    });
  }

  function downloadOne(id) {
    const c=document.getElementById(id);
    const a=document.createElement('a');
    a.download=`fitcore-${id}.png`; a.href=c.toDataURL('image/png'); a.click();
  }

  function downloadAll() { posts.forEach(p=>downloadOne(p.id)); }

  renderPosts();
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: #07090e;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 100%;
    position: relative;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
  }

  /* Ambient glow orbs */
  .orb1 {
    position: absolute;
    top: 15%;
    left: 30%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,229,200,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .orb2 {
    position: absolute;
    bottom: 20%;
    right: 20%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,196,170,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* Logo container */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    z-index: 1;
  }

  /* FC circle */
  .logo-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 2px solid rgba(0,229,200,0.3);
    background: rgba(0,229,200,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-circle span {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .logo-circle .f { color: #ffffff; }
  .logo-circle .c { color: #00e5c8; }

  /* FitCore text */
  .logo-text {
    font-size: 42px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .logo-text .fit { color: #ffffff; }
  .logo-text .core { color: #00e5c8; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="logo-wrap">
    <div class="logo-circle">
      <span><span class="f">F</span><span class="c">C</span></span>
    </div>
    <div class="logo-text">
      <span class="fit">Fit</span><span class="core">Core</span>
    </div>
  </div>
</body>
</html>

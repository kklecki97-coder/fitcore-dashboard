    // ── Helper Functions ──
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function fillRoundRect(ctx, x, y, w, h, r, color) {
      roundRect(ctx, x, y, w, h, r); ctx.fillStyle = color; ctx.fill();
    }

    function strokeRoundRect(ctx, x, y, w, h, r, color, lw) {
      roundRect(ctx, x, y, w, h, r); ctx.strokeStyle = color; ctx.lineWidth = lw || 1; ctx.stroke();
    }

    function drawLogo(ctx, x, y, size) {
      const half = size / 2, cx = x + half, cy = y + half;
      const bgGrad = ctx.createLinearGradient(x, y, x + size, y + size);
      bgGrad.addColorStop(0, '#0c1017'); bgGrad.addColorStop(1, BG);
      ctx.beginPath(); ctx.arc(cx, cy, half, 0, Math.PI * 2); ctx.fillStyle = bgGrad; ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy, half - size * 0.012, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0, 229, 200, 0.2)'; ctx.lineWidth = size * 0.005; ctx.stroke();
      const fontSize = size * 0.39;
      ctx.font = `800 ${fontSize}px 'Outfit', sans-serif`;
      ctx.textBaseline = 'middle';
      const fW = ctx.measureText('F').width;
      const cW = ctx.measureText('C').width;
      const startX = cx - (fW + cW) / 2;
      const textY = cy + fontSize * 0.04;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#FFFFFF'; ctx.fillText('F', startX, textY);
      const tGrad = ctx.createLinearGradient(cx - size * 0.2, 0, cx + size * 0.2, y + size);
      tGrad.addColorStop(0, '#00e5c8'); tGrad.addColorStop(1, '#00c4aa');
      ctx.fillStyle = tGrad; ctx.fillText('C', startX + fW, textY);
    }

    function drawBrandName(ctx, x, y, fontSize) {
      ctx.font = `700 ${fontSize}px 'Outfit', sans-serif`;
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillStyle = TEXT;
      const fitW = ctx.measureText('Fit').width;
      ctx.fillText('Fit', x, y);
      ctx.fillStyle = ACCENT; ctx.fillText('Core', x + fitW, y);
    }

    function drawBackground(ctx) {
      ctx.fillStyle = BG; ctx.fillRect(0, 0, S, S);
      const grad = ctx.createRadialGradient(S * 0.8, S * 0.1, 0, S * 0.8, S * 0.1, S * 0.7);
      grad.addColorStop(0, 'rgba(0, 229, 200, 0.06)'); grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, S, S);
      const grad2 = ctx.createRadialGradient(S * 0.1, S * 0.9, 0, S * 0.1, S * 0.9, S * 0.5);
      grad2.addColorStop(0, 'rgba(99, 102, 241, 0.04)'); grad2.addColorStop(1, 'transparent');
      ctx.fillStyle = grad2; ctx.fillRect(0, 0, S, S);
    }

    function drawGlassCard(ctx, x, y, w, h, r) {
      fillRoundRect(ctx, x, y, w, h, r || 20, 'rgba(14, 18, 27, 0.85)');
      strokeRoundRect(ctx, x, y, w, h, r || 20, 'rgba(255,255,255,0.06)', 1.5);
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(' ');
      let line = '', ty = y;
      for (let i = 0; i < words.length; i++) {
        const test = line + words[i] + ' ';
        if (ctx.measureText(test).width > maxWidth && i > 0) {
          ctx.fillText(line.trim(), x, ty); line = words[i] + ' '; ty += lineHeight;
        } else { line = test; }
      }
      ctx.fillText(line.trim(), x, ty);
      return ty;
    }

    function drawFooter(ctx, text) {
      ctx.fillStyle = TEXT3;
      ctx.font = '500 16px "Outfit", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(text || 'fitcore.tech', S / 2, S - 50);
    }

    function drawHeader(ctx) {
      drawLogo(ctx, 60, 50, 48);
      drawBrandName(ctx, 120, 74, 22);
    }

    function drawAccentLine(ctx, y) {
      const grad = ctx.createLinearGradient(S / 2 - 120, 0, S / 2 + 120, 0);
      grad.addColorStop(0, 'transparent'); grad.addColorStop(0.5, ACCENT); grad.addColorStop(1, 'transparent');
      ctx.strokeStyle = grad; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(S / 2 - 120, y); ctx.lineTo(S / 2 + 120, y); ctx.stroke();
    }

      ctx.fillStyle = RED;
      ctx.font = '800 28px "Outfit", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('REALNIE: 8-12 GODZIN / TYDZIEŃ', S / 2, totalY + 42);

      drawFooter(ctx, 'A gdyby to zajęło 15 minut? → fitcore.tech');
    }

    // ── Render & Download Logic ──
    function renderAll() {
      const grid = document.getElementById('grid');
      posts.forEach(p => {
        const wrap = document.createElement('div');
        wrap.className = 'post-wrap';

        const label = document.createElement('div');
        label.className = 'post-label';
        label.textContent = p.label;

        const frame = document.createElement('div');
        frame.className = 'post-frame';

        const canvas = document.createElement('canvas');
        canvas.width = S;
        canvas.height = S;
        canvas.id = p.id;

        frame.appendChild(canvas);

        const btn = document.createElement('button');
        btn.textContent = 'Download PNG';
        btn.onclick = () => downloadPost(p.id, p.label);

        const captionBox = document.createElement('div');
        captionBox.className = 'caption-box';
        captionBox.innerHTML = `<div class="label">Caption (click to copy)</div>${p.caption}`;
        captionBox.onclick = () => {
          navigator.clipboard.writeText(p.caption);
          let c = captionBox.querySelector('.copied');
          if (!c) { c = document.createElement('div'); c.className = 'copied'; captionBox.appendChild(c); }
          c.textContent = '✓ Copied!';
          setTimeout(() => c.textContent = '', 2000);
        };

        wrap.appendChild(label);
        wrap.appendChild(frame);
        wrap.appendChild(btn);
        wrap.appendChild(captionBox);
        grid.appendChild(wrap);

        const ctx = canvas.getContext('2d');
        p.draw(ctx);
      });
    }

    function downloadPost(id, label) {
      const canvas = document.getElementById(id);
      const link = document.createElement('a');
      link.download = `fitcore-${label.replace(/[^a-z0-9]/gi, '-').toLowerCase()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadAll() {
      posts.forEach((p, i) => {
        setTimeout(() => downloadPost(p.id, p.label), i * 300);
      });
    }

    // Wait for fonts
    document.fonts.ready.then(() => renderAll());
  </script>

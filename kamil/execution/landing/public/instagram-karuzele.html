<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>FitCore - Karuzele Instagram (Tydzień)</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07090e; color: #f0f2f5; font-family: 'Outfit', sans-serif;
      padding: 48px 24px; display: flex; flex-direction: column; align-items: center; gap: 48px;
    }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }
    h1 span { color: #00e5c8; }
    .subtitle { color: #8b92a5; font-size: 15px; margin-top: 8px; }
    .day-section {
      max-width: 1400px; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 48px;
    }
    .day-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
    }
    .day-badge {
      background: linear-gradient(135deg, #00e5c8, #00c4aa);
      color: #07090e; font-weight: 800; font-size: 13px; padding: 6px 16px;
      border-radius: 8px; text-transform: uppercase; letter-spacing: 1px;
    }
    .day-title { font-size: 22px; font-weight: 700; }
    .day-theme { color: #8b92a5; font-size: 14px; margin-left: auto; }
    .carousel-strip {
      display: flex; gap: 16px; overflow-x: auto; padding: 8px 0 16px;
      scrollbar-width: thin; scrollbar-color: #1a1f2e #07090e;
    }
    .carousel-strip::-webkit-scrollbar { height: 6px; }
    .carousel-strip::-webkit-scrollbar-track { background: #07090e; }
    .carousel-strip::-webkit-scrollbar-thumb { background: #1a1f2e; border-radius: 3px; }
    .slide-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .slide-num { font-size: 11px; color: #525a6e; font-weight: 600; letter-spacing: 1px; }
    .slide-frame {
      width: 400px; height: 400px; border-radius: 14px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    canvas { width: 400px; height: 400px; display: block; }
    .slide-btn {
      background: rgba(14,18,27,0.85); border: 1px solid rgba(255,255,255,0.08);
      color: #8b92a5; padding: 6px 16px; border-radius: 8px;
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 11px;
      cursor: pointer; transition: all 0.2s;
    }
    .slide-btn:hover { border-color: #00e5c8; color: #00e5c8; }
    .carousel-actions {
      display: flex; gap: 12px; margin-top: 8px; align-items: center;
    }
    .dl-carousel {
      background: linear-gradient(135deg, #00e5c8, #00c4aa);
      color: #07090e; border: none; padding: 10px 24px; border-radius: 10px;
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: transform 0.2s;
    }
    .dl-carousel:hover { transform: translateY(-2px); }
    .dl-all-btn {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff; border: none; padding: 14px 36px; border-radius: 12px;
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 15px;
      cursor: pointer; transition: transform 0.2s;
    }
    .dl-all-btn:hover { transform: translateY(-2px); }
    .caption-box {
      background: rgba(14,18,27,0.85); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 14px 18px; font-size: 12px; color: #8b92a5;
      max-width: 100%; width: 100%; line-height: 1.6; white-space: pre-wrap;
      cursor: pointer; transition: border-color 0.2s; margin-top: 8px;
    }
    .caption-box:hover { border-color: rgba(255,255,255,0.12); }
    .caption-box .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #525a6e; margin-bottom: 6px; }
    .copied { color: #00e5c8; font-size: 11px; margin-top: 4px; }
    .swipe-hint { color: #525a6e; font-size: 11px; font-style: italic; }
  </style>
</head>
<body>
  <div style="text-align:center">
    <h1>Fit<span>Core</span> — Karuzele na tydzień</h1>
    <p class="subtitle">7 karuzeli (3-4 slajdy każda) gotowych do pobrania. Hook → Rozwinięcie → CTA.</p>
  </div>

  <button class="dl-all-btn" onclick="downloadAll()">Pobierz wszystkie karuzele</button>

  <div id="carousels"></div>

  <script>
    const S = 1080;
    const ACCENT = '#00e5c8';
    const ACCENT2 = '#6366f1';
    const BG = '#07090e';
    const BG2 = '#0c1017';
    const TEXT = '#f0f2f5';
    const TEXT2 = '#8b92a5';
    const TEXT3 = '#525a6e';
    const RED = '#ef4444';
    const GREEN = '#22c55e';
    const AMBER = '#f59e0b';

    // ── Helper Functions ──
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function fillRoundRect(ctx, x, y, w, h, r, color) {
      roundRect(ctx, x, y, w, h, r); ctx.fillStyle = color; ctx.fill();
    }

    function strokeRoundRect(ctx, x, y, w, h, r, color, lw) {
      roundRect(ctx, x, y, w, h, r); ctx.strokeStyle = color; ctx.lineWidth = lw || 1; ctx.stroke();
    }

    function drawBG(ctx) {
      ctx.fillStyle = BG; ctx.fillRect(0, 0, S, S);
      const g1 = ctx.createRadialGradient(S * 0.8, S * 0.1, 0, S * 0.8, S * 0.1, S * 0.7);
      g1.addColorStop(0, 'rgba(0, 229, 200, 0.06)'); g1.addColorStop(1, 'transparent');
      ctx.fillStyle = g1; ctx.fillRect(0, 0, S, S);
      const g2 = ctx.createRadialGradient(S * 0.1, S * 0.9, 0, S * 0.1, S * 0.9, S * 0.5);
      g2.addColorStop(0, 'rgba(99, 102, 241, 0.04)'); g2.addColorStop(1, 'transparent');
      ctx.fillStyle = g2; ctx.fillRect(0, 0, S, S);
    }

    function drawLogo(ctx, x, y, size) {
      const half = size / 2, cx = x + half, cy = y + half;
      ctx.beginPath(); ctx.arc(cx, cy, half, 0, Math.PI * 2);
      ctx.fillStyle = BG2; ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy, half - 1, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0, 229, 200, 0.2)'; ctx.lineWidth = size * 0.005; ctx.stroke();
      const fs = size * 0.39;
      ctx.font = `800 ${fs}px 'Outfit', sans-serif`;
      ctx.textBaseline = 'middle';
      const fW = ctx.measureText('F').width;
      const cW = ctx.measureText('C').width;
      const startX = cx - (fW + cW) / 2;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#FFFFFF'; ctx.fillText('F', startX, cy + fs * 0.04);
      const tg = ctx.createLinearGradient(cx - size * 0.2, 0, cx + size * 0.2, y + size);
      tg.addColorStop(0, '#00e5c8'); tg.addColorStop(1, '#00c4aa');
      ctx.fillStyle = tg; ctx.fillText('C', startX + fW, cy + fs * 0.04);
    }

    function drawBrandSmall(ctx, x, y, fs) {
      ctx.font = `700 ${fs}px 'Outfit', sans-serif`;
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillStyle = TEXT;
      const w = ctx.measureText('Fit').width;
      ctx.fillText('Fit', x, y);
      ctx.fillStyle = ACCENT; ctx.fillText('Core', x + w, y);
    }

    function drawHeader(ctx) {
      drawLogo(ctx, 60, 45, 48);
      drawBrandSmall(ctx, 120, 69, 22);
    }

    function drawGlass(ctx, x, y, w, h, r) {
      fillRoundRect(ctx, x, y, w, h, r || 20, 'rgba(14, 18, 27, 0.85)');
      strokeRoundRect(ctx, x, y, w, h, r || 20, 'rgba(255,255,255,0.06)', 1.5);
    }

    function accentLine(ctx, y) {
      const g = ctx.createLinearGradient(S / 2 - 140, 0, S / 2 + 140, 0);
      g.addColorStop(0, 'transparent'); g.addColorStop(0.5, ACCENT); g.addColorStop(1, 'transparent');
      ctx.strokeStyle = g; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(S / 2 - 140, y); ctx.lineTo(S / 2 + 140, y); ctx.stroke();
    }

    function wrapText(ctx, text, x, y, maxW, lh) {
      const words = text.split(' ');
      let line = '', ty = y;
      for (let i = 0; i < words.length; i++) {
        const test = line + words[i] + ' ';
        if (ctx.measureText(test).width > maxW && i > 0) {
          ctx.fillText(line.trim(), x, ty); line = words[i] + ' '; ty += lh;
        } else { line = test; }
      }
      ctx.fillText(line.trim(), x, ty);
      return ty;
    }

    function drawFooter(ctx, text) {
      ctx.fillStyle = TEXT3; ctx.font = '500 18px "Outfit", sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(text || 'fitcore.tech', S / 2, S - 50);
    }

    function slideIndicator(ctx, total, current) {
      const dotR = 6, gap = 20, startX = S / 2 - ((total - 1) * gap) / 2;
      for (let i = 0; i < total; i++) {
        ctx.beginPath();
        ctx.arc(startX + i * gap, S - 90, dotR, 0, Math.PI * 2);
        ctx.fillStyle = i === current ? ACCENT : 'rgba(255,255,255,0.15)';
        ctx.fill();
      }
    }

    function drawCTAButton(ctx, text, x, y, w, h) {
      const g = ctx.createLinearGradient(x, y, x + w, y + h);
      g.addColorStop(0, '#00e5c8'); g.addColorStop(1, '#00c4aa');
      fillRoundRect(ctx, x, y, w, h, h / 2, 'placeholder');
      roundRect(ctx, x, y, w, h, h / 2); ctx.fillStyle = g; ctx.fill();
      ctx.fillStyle = BG; ctx.font = `700 ${h * 0.42}px "Outfit", sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, x + w / 2, y + h / 2 + 1);
    }

    // ═══════════════════════════════════════════
    //  PONIEDZIAŁEK — Ból admina
    // ═══════════════════════════════════════════

    function pn_hook(ctx) {
      drawBG(ctx);
      drawHeader(ctx);
      slideIndicator(ctx, 4, 0);

      // Big shocking number
      ctx.fillStyle = RED;
      ctx.font = '900 180px "Outfit", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('12h', S / 2, S * 0.38);

      // Subtitle
      ctx.fillStyle = TEXT;
      ctx.font = '700 36px "Outfit", sans-serif';
      ctx.fillText('tygodniowo na administrację.', S / 2, S * 0.53);

      ctx.fillStyle = TEXT2;
      ctx.font = '400 24px "Outfit", sans-serif';
      ctx.fillText('Tyle traci przeciętny trener personalny.', S / 2, S * 0.6);

      // Swipe hint
      ctx.fillStyle = ACCENT;
      ctx.font = '600 20px "Outfit", sans-serif';
      ctx.fillText('Przesuń, żeby zobaczyć na co →', S / 2, S * 0.72);

      drawFooter(ctx);
    }

    function pn_slide2(ctx) {
      drawBG(ctx);
      drawHeader(ctx);
      slideIndicator(ctx, 4, 1);

      ctx.fillStyle = AMBER;
      ctx.font = '600 16px "Outfit", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('NA CO TRACISZ CZAS?', 60, 140);

      ctx.fillStyle = TEXT;
      ctx.font = '800 38px "Outfit", sans-serif';
      wrapText(ctx, 'Twój tygodniowy audyt czasu', 60, 200, S - 120, 46);

      accentLine(ctx, 270);

      const tasks = [
        { task: 'Odpisywanie na wiadomości', time: '3h 45min', icon: '💬' },
        { task: 'Pisanie planów treningowych', time: '2h', icon: '📝' },
        { task: 'Śledzenie płatności', time: '1h', icon: '💳' },
        { task: 'Aktualizacja postępów klientów', time: '1h 30min', icon: '📊' },
        { task: 'Szukanie info o kliencie', time: '2h 30min', icon: '🔍' },
        { task: 'Koordynacja grafiku', time: '1h 15min', icon: '📅' },
      ];

      tasks.forEach((t, i) => {
        const y = 305 + i * 82;
        fillRoundRect(ctx, 60, y, S - 120, 68, 14, 'rgba(239, 68, 68, 0.06)');
        strokeRoundRect(ctx, 60, y, S - 120, 68, 14, 'rgba(239, 68, 68, 0.12)', 1);

        ctx.font = '26px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(t.icon, 85, y + 40);

        ctx.fillStyle = TEXT; ctx.font = '500 20px "Outfit", sans-serif';
        ctx.fillText(t.task, 130, y + 38);

        ctx.fillStyle = RED; ctx.font = '700 20px "JetBrains Mono", monospace';
        ctx.textAlign = 'right';
        ctx.fillText(t.time, S - 85, y + 38);
      });

      // Total bar
      fillRoundRect(ctx, 60, 805, S - 120, 64, 14, 'rgba(239, 68, 68, 0.15)');
      strokeRoundRect(ctx, 60, 805, S - 120, 64, 14, 'rgba(239, 68, 68, 0.3)', 2);
      ctx.fillStyle = RED; ctx.font = '800 26px "Outfit", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('RAZEM: ~12 GODZIN / TYDZIEŃ', S / 2, 842);

      drawFooter(ctx);
    }

    function pn_slide3(ctx) {
      drawBG(ctx);
      drawHeader(ctx);
      slideIndicator(ctx, 4, 2);

      ctx.fillStyle = GREEN;
      ctx.font = '600 16px "Outfit", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('A GDYBY TAK...', 60, 140);

      ctx.fillStyle = TEXT;
      ctx.font = '800 42px "Outfit", sans-serif';
      wrapText(ctx, 'Te 12 godzin zamienić w 30 minut?', 60, 200, S - 120, 52);

      accentLine(ctx, 300);

      const cardW = S / 2 - 80;
      const cardH = 480;
      const cardY = 330;
      const leftX = 55;
      const rightX = S / 2 + 25;

      // BEFORE card
      fillRoundRect(ctx, leftX, cardY, cardW, cardH, 20, 'rgba(239, 68, 68, 0.06)');
      strokeRoundRect(ctx, leftX, cardY, cardW, cardH, 20, 'rgba(239, 68, 68, 0.15)', 1.5);

      // Header bar
      fillRoundRect(ctx, leftX, cardY, cardW, 56, 20, 'rgba(239, 68, 68, 0.12)');
      fillRoundRect(ctx, leftX, cardY + 40, cardW, 16, 0, 'rgba(239, 68, 68, 0.12)');
      ctx.fillStyle = RED; ctx.font = '800 22px "Outfit", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('❌  TERAZ', leftX + cardW / 2, cardY + 36);

      const beforeItems = [
        { icon: '📱', text: 'WhatsApp chaos' },
        { icon: '📊', text: 'Excel tabele' },
        { icon: '🧾', text: 'Ręczne faktury' },
        { icon: '🔍', text: 'Szukanie info' },
        { icon: '😵', text: 'Brak kontroli' },
        { icon: '😰', text: 'Stres i chaos' },
      ];

      beforeItems.forEach((item, i) => {
        const iy = cardY + 90 + i * 62;
        ctx.font = '22px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(item.icon, leftX + 30, iy + 6);
        ctx.fillStyle = TEXT2; ctx.font = '500 20px "Outfit", sans-serif';
        ctx.fillText(item.text, leftX + 65, iy + 4);
        // Separator line
        if (i < beforeItems.length - 1) {
          ctx.strokeStyle = 'rgba(239, 68, 68, 0.08)'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(leftX + 30, iy + 36); ctx.lineTo(leftX + cardW - 30, iy + 36); ctx.stroke();
        }
      });

      // AFTER card
      fillRoundRect(ctx, rightX, cardY, cardW, cardH, 20, 'rgba(0, 229, 200, 0.06)');
      strokeRoundRect(ctx, rightX, cardY, cardW, cardH, 20, 'rgba(0, 229, 200, 0.15)', 1.5);

      // Header bar
      fillRoundRect(ctx, rightX, cardY, cardW, 56, 20, 'rgba(0, 229, 200, 0.12)');
      fillRoundRect(ctx, rightX, cardY + 40, cardW, 16, 0, 'rgba(0, 229, 200, 0.12)');
      ctx.fillStyle = GREEN; ctx.font = '800 22px "Outfit", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('✅  Z FITCORE', rightX + cardW / 2, cardY + 36);

      const afterItems = [
        { icon: '🖥️', text: 'Jeden dashboard' },
        { icon: '👆', text: 'Klik i gotowe' },
        { icon: '💳', text: 'Auto-płatności' },
        { icon: '📦', text: 'Wszystko w jednym' },
        { icon: '🎯', text: 'Pełna kontrola' },
        { icon: '😌', text: 'Spokój i wolność' },
      ];

      afterItems.forEach((item, i) => {
        const iy = cardY + 90 + i * 62;
        ctx.font = '22px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(item.icon, rightX + 30, iy + 6);
        ctx.fillStyle = TEXT2; ctx.font = '500 20px "Outfit", sans-serif';
        ctx.fillText(item.text, rightX + 65, iy + 4);
        if (i < afterItems.length - 1) {
          ctx.strokeStyle = 'rgba(0, 229, 200, 0.08)'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(rightX + 30, iy + 36); ctx.lineTo(rightX + cardW - 30, iy + 36); ctx.stroke();
        }
      });

      // Center arrow between cards
      const arrowY = cardY + cardH / 2;
      ctx.fillStyle = ACCENT;
      ctx.font = '900 36px "Outfit", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('→', S / 2, arrowY);

      // Bottom transformation bar
      const barY = cardY + cardH + 30;
      fillRoundRect(ctx, 120, barY, S - 240, 70, 18, 'rgba(0, 229, 200, 0.1)');
      strokeRoundRect(ctx, 120, barY, S - 240, 70, 18, 'rgba(0, 229, 200, 0.2)', 1.5);

      ctx.fillStyle = RED; ctx.font = '800 28px "Outfit", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('12h', S / 2 - 30, barY + 43);

      ctx.fillStyle = ACCENT; ctx.font = '800 28px "Outfit", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('→', S / 2, barY + 43);

      ctx.fillStyle = GREEN; ctx.font = '800 28px "Outfit", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('30 min', S / 2 + 30, barY + 43);

      drawFooter(ctx);
    }

    function pn_cta(ctx) {
      drawBG(ctx);
      slideIndicator(ctx, 4, 3);

      // Big centered logo
      drawLogo(ctx, S / 2 - 60, 160, 120);

      ctx.fillStyle = TEXT; ctx.font = '800 48px "Outfit", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Odzyskaj swój czas.', S / 2, 370);

      ctx.fillStyle = TEXT2; ctx.font = '400 24px "Outfit", sans-serif';
      ctx.fillText('Ty trenujesz. My ogarniamy resztę.', S / 2, 430);

      accentLine(ctx, 490);

      drawCTAButton(ctx, 'fitcore.tech', S / 2 - 150, 540, 300, 64);

      drawFooter(ctx);
    }

    // ═══════════════════════════════════════════
    //  WTOREK — Excel to nie narzędzie
    // ═══════════════════════════════════════════

    function wt_hook(ctx) {
      drawBG(ctx);
      drawHeader(ctx);
      slideIndicator(ctx, 4, 0);

      ctx.fillStyle = TEXT;
      ctx.font = '800 52px "Outfit", sans-serif';
      ctx.textAlign = 'center';
      wrapText(ctx, 'Twój klient dostaje', S / 2, S * 0.28, S - 120, 62);

      // Highlighted "PDF z Excela"
      fillRoundRect(ctx, S / 2 - 240, S * 0.46, 480, 80, 16, 'rgba(239, 68, 68, 0.12)');
      strokeRoundRect(ctx, S / 2 - 240, S * 0.46, 480, 80, 16, 'rgba(239, 68, 68, 0.25)', 2);
      ctx.fillStyle = RED;
      ctx.font = '900 52px "Outfit", sans-serif';
      ctx.fillText('PDF z Excela.', S / 2, S * 0.46 + 52);

      ctx.fillStyle = TEXT2;
      ctx.font = '500 28px "Outfit", sans-serif';
      ctx.fillText('Serio?', S / 2, S * 0.64);

      ctx.fillStyle = ACCENT;
      ctx.font = '600 20px "Outfit", sans-serif';
      ctx.fillText('Przesuń i zobacz jak to wygląda z drugiej strony →', S / 2, S * 0.74);

      drawFooter(ctx);
    }

    function wt_slide2(ctx) {
      drawBG(ctx);
      drawHeader(ctx);
      slideIndicator(ctx, 4, 1);

      ctx.fillStyle = RED;
      ctx.font = '600 16px "Outfit", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('CO WIDZI TWÓJ KLIENT', 60, 140);

      ctx.fillStyle = TEXT;
      ctx.font = '800 36px "Outfit", sans-serif';
      wrapText(ctx, 'Gdy zarządzasz przez Excela...', 60, 195, S - 120, 44);

      accentLine(ctx, 270);

      // Mock "ugly" Excel experience
      fillRoundRect(ctx, 80, 300, S - 160, 580, 18, 'rgba(239, 68, 68, 0.04)');
      strokeRoundRect(ctx, 80, 300, S - 160, 580, 18, 'rgba(239, 68, 68, 0.1)', 1);

      const problems = [
        { icon: '📄', title: 'Plan treningowy', desc: 'PDF w chacie WhatsApp — ginie po 2 dniach' },
        { icon: '💸', title: 'Płatność', desc: '"Hej, przelew miał być do piątku" — SMS' },
        { icon: '📊', title: 'Postępy', desc: 'Screenshot tabeli z 200 wierszami' },
        { icon: '💬', title: 'Komunikacja', desc: 'WhatsApp + Mail + SMS + Messenger' },
        { icon: '🤷', title: 'Profesjonalizm', desc: 'Klient myśli: "czy to poważna firma?"' },
      ];

      problems.forEach((p, i) => {
        const y = 330 + i * 100;
        ctx.font = '28px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(p.icon, 110, y + 40);

        ctx.fillStyle = TEXT; ctx.font = '700 22px "Outfit", sans-serif';
        ctx.fillText(p.title, 160, y + 30);

        ctx.fillStyle = RED; ctx.font = '400 17px "Outfit", sans-serif';

    // ═══════════════════════════════════════════
    //  RENDER & DOWNLOAD
    // ═══════════════════════════════════════════

    function renderAll() {
      const container = document.getElementById('carousels');

      carousels.forEach((car, ci) => {
        const section = document.createElement('div');
        section.className = 'day-section';

        // Header
        const header = document.createElement('div');
        header.className = 'day-header';
        header.innerHTML = `
          <span class="day-badge">${car.day}</span>
          <span class="day-title">${car.theme}</span>
          <span class="swipe-hint">${car.slides.length} slajdów → przewiń</span>
        `;
        section.appendChild(header);

        // Carousel strip
        const strip = document.createElement('div');
        strip.className = 'carousel-strip';

        car.slides.forEach((slide, si) => {
          const wrap = document.createElement('div');
          wrap.className = 'slide-wrap';

          const num = document.createElement('div');
          num.className = 'slide-num';
          num.textContent = `SLAJD ${si + 1} — ${slide.label}`;

          const frame = document.createElement('div');
          frame.className = 'slide-frame';

          const canvas = document.createElement('canvas');
          canvas.width = S; canvas.height = S;
          canvas.id = `c${ci}_s${si}`;
          frame.appendChild(canvas);

          const btn = document.createElement('button');
          btn.className = 'slide-btn';
          btn.textContent = 'Pobierz PNG';
          btn.onclick = () => downloadSlide(ci, si);

          wrap.appendChild(num);
          wrap.appendChild(frame);
          wrap.appendChild(btn);
          strip.appendChild(wrap);
        });

        section.appendChild(strip);

        // Actions row
        const actions = document.createElement('div');
        actions.className = 'carousel-actions';

        const dlBtn = document.createElement('button');
        dlBtn.className = 'dl-carousel';
        dlBtn.textContent = `Pobierz całą karuzelę (${car.slides.length} slajdów)`;
        dlBtn.onclick = () => downloadCarousel(ci);
        actions.appendChild(dlBtn);

        section.appendChild(actions);

        // Caption
        const captionBox = document.createElement('div');
        captionBox.className = 'caption-box';
        captionBox.innerHTML = `<div class="label">Caption (kliknij żeby skopiować)</div>${car.caption}`;
        captionBox.onclick = () => {
          navigator.clipboard.writeText(car.caption);
          let c = captionBox.querySelector('.copied');
          if (!c) { c = document.createElement('div'); c.className = 'copied'; captionBox.appendChild(c); }
          c.textContent = '✓ Skopiowano!';
          setTimeout(() => c.textContent = '', 2000);
        };
        section.appendChild(captionBox);

        container.appendChild(section);

        // Draw all slides
        car.slides.forEach((slide, si) => {
          const ctx = document.getElementById(`c${ci}_s${si}`).getContext('2d');
          slide.draw(ctx);
        });
      });
    }

    function downloadSlide(ci, si) {
      const canvas = document.getElementById(`c${ci}_s${si}`);
      const link = document.createElement('a');
      const day = carousels[ci].day.toLowerCase();
      link.download = `fitcore-${day}-slajd-${si + 1}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadCarousel(ci) {
      carousels[ci].slides.forEach((_, si) => {
        setTimeout(() => downloadSlide(ci, si), si * 300);
      });
    }

    function downloadAll() {
      let delay = 0;
      carousels.forEach((car, ci) => {
        car.slides.forEach((_, si) => {
          setTimeout(() => downloadSlide(ci, si), delay);
          delay += 300;
        });
      });
    }

    document.fonts.ready.then(() => renderAll());
